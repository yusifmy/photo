<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slideshow-container">
        <div class="mySlides fade">
            <img src="./images/photo1.jpg" style="width:100%" alt="City Skyline">
            <div class="text">BEYA STEM Conference - Baltimore</div>
        </div>

        <div class="mySlides fade">
            <img src="./images/photo2.jpg" style="width:100%" alt="Headshot">
            <div class="text">Professional Portrait</div>
        </div>

        <div class="mySlides fade">
            <img src="./images/photo3.jpg" style="width:100%" alt="Sunset Photography">
            <div class="text">Capturing the Sunset</div>
        </div>

        <div class="mySlides fade">
             <img src="./images/photo4.jpg" style="width:100%" alt="Snowboarding">
            <div class="text">Night Sessions on the Slopes</div>
        </div>

        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
